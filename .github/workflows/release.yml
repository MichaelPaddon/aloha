name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # The Containerfile is the single build environment — it handles
      # all native deps (cmake, clang, PAM) so the runner stays clean.
      - name: Build OCI image
        run: |
          podman build \
            -f packaging/oci/Containerfile \
            -t aloha:$VERSION-${{ matrix.arch }} \
            .

      # Extract the compiled binary so cargo-deb and cargo-generate-rpm
      # can package it without a second compilation pass.
      - name: Extract binary from image
        run: |
          mkdir -p target/release
          CID=$(podman create aloha:$VERSION-${{ matrix.arch }})
          podman cp $CID:/usr/bin/aloha target/release/aloha
          podman rm $CID

      # cargo-deb and cargo-generate-rpm only need Cargo.toml metadata
      # plus the pre-built binary (--no-build / default behaviour).
      # Cache the installed tools keyed on Cargo.lock + arch so a
      # repeated release tag push doesn't reinstall from scratch.
      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-tools-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Cargo.lock') }}

      - name: Install packaging tools
        run: |
          command -v cargo-deb         || cargo install cargo-deb
          command -v cargo-generate-rpm || cargo install cargo-generate-rpm

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Build RPM package
        run: cargo generate-rpm

      - name: Push arch-tagged OCI image
        run: |
          OWNER=${GITHUB_REPOSITORY_OWNER,,}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push \
            aloha:$VERSION-${{ matrix.arch }} \
            ghcr.io/$OWNER/aloha:$VERSION-${{ matrix.arch }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/

      - name: Push multi-arch OCI manifest
        run: |
          OWNER=${GITHUB_REPOSITORY_OWNER,,}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin

          # Version-tagged manifest
          podman manifest create ghcr.io/$OWNER/aloha:$VERSION \
            ghcr.io/$OWNER/aloha:$VERSION-amd64 \
            ghcr.io/$OWNER/aloha:$VERSION-arm64
          podman manifest push ghcr.io/$OWNER/aloha:$VERSION

          # Latest alias
          podman manifest create ghcr.io/$OWNER/aloha:latest \
            ghcr.io/$OWNER/aloha:$VERSION-amd64 \
            ghcr.io/$OWNER/aloha:$VERSION-arm64
          podman manifest push ghcr.io/$OWNER/aloha:latest

      - name: Generate release notes
        run: |
          {
            awk '/^---$/{found=1; next} found && /^## /{exit} found && NF{print}' README.md
            echo ""
            echo "See the [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for configuration and usage."
          } > release-notes.md

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "aloha $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --draft \
            dist/*.deb \
            dist/*.rpm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
