name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release and upload assets
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install system dependencies
        run: sudo apt-get install -y libpam0g-dev

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Build RPM package
        run: cargo generate-rpm

      - name: Build and push OCI image
        run: |
          OWNER=${GITHUB_REPOSITORY_OWNER,,}
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman build \
            -f packaging/oci/Containerfile \
            -t ghcr.io/$OWNER/aloha:$VERSION \
            -t ghcr.io/$OWNER/aloha:latest \
            .
          podman push ghcr.io/$OWNER/aloha:$VERSION
          podman push ghcr.io/$OWNER/aloha:latest

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "aloha $GITHUB_REF_NAME" \
            --draft \
            $(ls target/debian/*.deb) \
            $(ls target/generate-rpm/*.rpm)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
