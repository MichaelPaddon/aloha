<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 55 600 250" role="img" aria-labelledby="title desc">
  <title id="title">Aloha</title>
  <desc id="desc">A solid navy disc with a horizon line passing through the center, with the aloha wordmark in heavy geometric sans knocked out in cream.</desc>

  <!-- horizon line, breaks at disc -->
  <line x1="60" y1="180" x2="225" y2="180" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="455" y1="180" x2="620" y2="180" stroke="#1e3a5f" stroke-width="2.5" stroke-linecap="round"/>

  <!-- solid disc -->
  <circle cx="340" cy="180" r="110" fill="#1e3a5f"/>

  <!-- horizon line through disc, nubs stop ~20% of radius short of text -->
  <line x1="230" y1="180" x2="238" y2="180" stroke="#FAECE7" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="442" y1="180" x2="450" y2="180" stroke="#FAECE7" stroke-width="2.5" stroke-linecap="round"/>

  <!-- aloha wordmark, centered -->
  <text x="340" y="202" text-anchor="middle" font-family="Futura, 'Century Gothic', 'Avenir Next', sans-serif" font-size="72" font-weight="700" fill="#FAECE7" letter-spacing="0">aloha</text>
</svg>
